<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTM E-Commerce Pipeline</title>
    
    <!-- Tailwind CSS (CDN Compiler) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (UMD Standard) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel (In-Browser JSX Transpilation) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Baseline Custom Scrollbar for Pipeline Matrices */
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        body { margin: 0; padding: 0; background-color: #f8fafc; }
    </style>
</head>
<body>
    <!-- The React Application Root -->
    <div id="pipeline-root"></div>

    <!-- The Application Logic (React + Firebase ES Modules) -->
    <script type="text/babel" data-type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // 1. REACT DESTRUCTURING & CORE CONSTANTS
        const { useState, useEffect, useMemo } = window.React;

        // [EMERGENT PARADIGM] Adaptive Cloud Matrix Initialization
        // We evaluate the config. If no apiKey is present, we prevent Firebase from throwing initialization errors.
        const firebaseConfig = { projectId: "demo-project" }; // Add your 'apiKey' and other keys here later for cloud sync
        const isLocalMode = !firebaseConfig.apiKey; 

        let app, auth, db;
        if (!isLocalMode) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        }
        
        const appId = 'youcan-pipeline-v1';

        // 2. STATIC ONTOLOGY
        const PIPELINE_PHASES = [
            { index: 0, name: "Product Research", color: "bg-slate-100 border-slate-300" },
            { index: 1, name: "Selling Angles Refiner", color: "bg-blue-50 border-blue-200" },
            { index: 2, name: "Product Page Creation", color: "bg-indigo-50 border-indigo-200" },
            { index: 3, name: "UGC Creation", color: "bg-purple-50 border-purple-200" },
            { index: 4, name: "FB Ad Campaign", color: "bg-pink-50 border-pink-200" },
            { index: 5, name: "Launch / Live", color: "bg-emerald-50 border-emerald-300" }
        ];

        const AGENTS = [
            { id: "agent_01", name: "Partner A" },
            { id: "agent_02", name: "Partner B" }
        ];

        const STORES = [
            { id: "store_A", name: "General Beauty" },
            { id: "store_B", name: "Niche Electronics" }
        ];

        // 3. INLINE SVG ICONOGRAPHY (Bypassing external dependency trees)
        const IconPlus = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const IconX = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const IconGrip = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="12" r="1"></circle><circle cx="9" cy="5" r="1"></circle><circle cx="9" cy="19" r="1"></circle><circle cx="15" cy="12" r="1"></circle><circle cx="15" cy="5" r="1"></circle><circle cx="15" cy="19" r="1"></circle></svg>;
        const IconClock = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const IconPackage = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>;
        const IconUser = () => <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
        const IconStore = () => <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>;
        const IconAlign = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="21" y1="10" x2="3" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="21" y1="18" x2="3" y2="18"></line></svg>;

        // 4. MAIN STATE MACHINE
        function PipelineApp() {
            const [user, setUser] = useState(null);
            const [products, setProducts] = useState([
                // Injecting placeholder data to immediately prove system viability
                { id: "demo_1", name: "Fayha Styling Tool GH12", storeId: "store_A", agentId: "agent_01", currentPhase: 1, notes: "Needs stronger hook.", dateAdded: Date.now(), lastModified: Date.now() },
                { id: "demo_2", name: "The Kegel Trainer", storeId: "store_A", agentId: "agent_02", currentPhase: 2, notes: "Awaiting copy.", dateAdded: Date.now(), lastModified: Date.now() }
            ]);
            const [isAuthLoading, setIsAuthLoading] = useState(true);
            const [error, setError] = useState(null);

            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [activeProductModal, setActiveProductModal] = useState(null);

            useEffect(() => {
                // Preemptively halt Firebase Auth attempting to load if no API key is provided
                if (isLocalMode) {
                    console.warn("SYSTEM NOTICE: Local Memory Matrix active. Firebase Auth bypassed due to missing API Key.");
                    setIsAuthLoading(false);
                    return;
                }

                const initAuth = async () => {
                    try {
                        await signInAnonymously(auth);
                    } catch (err) {
                        console.warn("Firebase Auth bypassed. Local Memory Matrix active.", err);
                        setIsAuthLoading(false);
                    }
                };
                initAuth();
                
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    setIsAuthLoading(false);
                });
                return () => unsubscribe && unsubscribe();
            }, []);

            // The Mutators (with Adaptive Fallback to Local Memory)
            const handleAddProduct = async (payload) => {
                const newProduct = { ...payload, id: `local_${Date.now()}`, currentPhase: 0, dateAdded: Date.now(), lastModified: Date.now() };
                
                if (isLocalMode) {
                    setProducts(prev => [newProduct, ...prev]);
                    setIsAddModalOpen(false);
                    return;
                }
                
                // Cloud logic preserved for future API key integration
                if (!user) return;
                try {
                    const productsRef = collection(db, 'artifacts', appId, 'public', 'data', 'pipeline_products');
                    await addDoc(productsRef, { ...newProduct, id: undefined });
                    setIsAddModalOpen(false);
                } catch(e) { console.error(e); }
            };

            const handleUpdatePhase = (productId, newPhaseIndex) => {
                setProducts(prev => prev.map(p => p.id === productId ? { ...p, currentPhase: newPhaseIndex, lastModified: Date.now() } : p));
                
                if (!isLocalMode && user) {
                    try {
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'pipeline_products', productId);
                        updateDoc(docRef, { currentPhase: newPhaseIndex, lastModified: Date.now() });
                    } catch(e) { console.error(e); }
                }
            };

            const handleUpdateDetails = (productId, updatedFields) => {
                setProducts(prev => prev.map(p => p.id === productId ? { ...p, ...updatedFields, lastModified: Date.now() } : p));
                setActiveProductModal(null);

                if (!isLocalMode && user) {
                    try {
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'pipeline_products', productId);
                        updateDoc(docRef, { ...updatedFields, lastModified: Date.now() });
                    } catch(e) { console.error(e); }
                }
            };

            const handleDeleteProduct = (productId) => {
                setProducts(prev => prev.filter(p => p.id !== productId));
                setActiveProductModal(null);

                if (!isLocalMode && user) {
                    try {
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'pipeline_products', productId);
                        deleteDoc(docRef);
                    } catch(e) { console.error(e); }
                }
            };

            // Drag Physics
            const onDragStart = (e, productId) => {
                e.dataTransfer.setData("text/plain", productId);
                e.dataTransfer.effectAllowed = "move";
            };

            const onDragOver = (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = "move";
            };

            const onDrop = (e, targetPhaseIndex) => {
                e.preventDefault();
                const productId = e.dataTransfer.getData("text/plain");
                if (productId) {
                    const product = products.find(p => p.id === productId);
                    if (product && product.currentPhase !== targetPhaseIndex) handleUpdatePhase(productId, targetPhaseIndex);
                }
            };

            if (isAuthLoading) return <div className="flex items-center justify-center min-h-screen text-slate-500 font-mono text-sm">[INITIALIZING MATRIX...]</div>;

            return (
                <div className="h-screen bg-slate-50 font-sans text-slate-900 flex flex-col overflow-hidden">
                    {/* Header */}
                    <header className="bg-white px-6 py-4 flex items-center justify-between shadow-sm border-b border-slate-200 z-10 shrink-0">
                        <div>
                            <h1 className="text-xl font-bold text-slate-800 tracking-tight">GTM Pipeline Overview</h1>
                            <p className="text-xs text-slate-500 font-medium flex items-center gap-2 mt-1">
                                <span className={`w-2 h-2 rounded-full ${isLocalMode ? 'bg-amber-400' : 'bg-emerald-500 animate-pulse'}`}></span>
                                {isLocalMode ? 'Local Memory Mode Active' : 'System Synchronized'} ({products.length} nodes)
                            </p>
                        </div>
                        <button onClick={() => setIsAddModalOpen(true)} className="flex items-center gap-2 bg-slate-900 hover:bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all shadow-md active:scale-95">
                            <IconPlus /> Inject Product
                        </button>
                    </header>

                    {/* Horizontal Node Matrix */}
                    <main className="flex-1 overflow-x-auto overflow-y-hidden hide-scroll bg-slate-100/50">
                        <div className="flex gap-6 p-6 h-full min-w-max items-start">
                            {PIPELINE_PHASES.map((phase) => {
                                const phaseProducts = products.filter(p => p.currentPhase === phase.index).sort((a,b) => b.lastModified - a.lastModified);
                                return (
                                    <div key={phase.index} onDragOver={onDragOver} onDrop={(e) => onDrop(e, phase.index)} className={`w-[320px] flex-shrink-0 flex flex-col rounded-xl border ${phase.color} shadow-sm h-[calc(100vh-120px)] transition-colors duration-200`}>
                                        <div className="p-4 border-b border-black/5 bg-white/40 backdrop-blur-sm rounded-t-xl flex justify-between items-center shrink-0">
                                            <h2 className="font-bold text-slate-700 text-sm uppercase tracking-wider">{phase.name}</h2>
                                            <span className="bg-white text-slate-600 text-xs font-bold px-2 py-1 rounded-full shadow-sm">{phaseProducts.length}</span>
                                        </div>
                                        <div className="p-3 flex-1 overflow-y-auto space-y-3 custom-scrollbar">
                                            {phaseProducts.map((product) => (
                                                <div key={product.id} draggable onDragStart={(e) => onDragStart(e, product.id)} onClick={() => setActiveProductModal(product)} className="bg-white rounded-xl p-4 shadow-sm border border-slate-200 cursor-grab active:cursor-grabbing hover:shadow-md hover:border-slate-300 transition-all group">
                                                    <div className="flex justify-between items-start mb-2">
                                                        <div className="flex items-center gap-2">
                                                            <div className="text-slate-300 group-hover:text-slate-500"><IconGrip /></div>
                                                            <h3 className="font-semibold text-slate-800 leading-tight">{product.name}</h3>
                                                        </div>
                                                    </div>
                                                    <div className="flex flex-wrap gap-2 mt-3">
                                                        <span className="inline-flex items-center gap-1 text-[10px] font-bold px-2 py-1 rounded-md bg-slate-100 text-slate-600 uppercase tracking-wide"><IconStore />{STORES.find(s => s.id === product.storeId)?.name}</span>
                                                        <span className="inline-flex items-center gap-1 text-[10px] font-bold px-2 py-1 rounded-md bg-indigo-50 text-indigo-600 uppercase tracking-wide"><IconUser />{AGENTS.find(a => a.id === product.agentId)?.name}</span>
                                                    </div>
                                                    {product.notes && (
                                                        <div className="mt-3 pt-3 border-t border-slate-100 text-xs text-slate-500 line-clamp-2">
                                                            <span className="inline-block mr-1 opacity-70 align-middle"><IconAlign /></span>{product.notes}
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                            {phaseProducts.length === 0 && (
                                                <div className="h-24 border-2 border-dashed border-slate-200 rounded-xl flex items-center justify-center text-slate-400 text-xs font-medium">Drop node here</div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </main>

                    {/* Modals */}
                    {isAddModalOpen && <AddProductModal onClose={() => setIsAddModalOpen(false)} onSubmit={handleAddProduct} />}
                    {activeProductModal && <ProductDetailsModal product={activeProductModal} onClose={() => setActiveProductModal(null)} onUpdate={handleUpdateDetails} onDelete={handleDeleteProduct} phases={PIPELINE_PHASES}/>}
                </div>
            );
        }

        // 5. SUB-COMPONENTS
        function AddProductModal({ onClose, onSubmit }) {
            const [formData, setFormData] = useState({ name: '', storeId: STORES[0].id, agentId: AGENTS[0].id, notes: '' });
            const handleSubmit = (e) => { e.preventDefault(); if (formData.name.trim()) onSubmit(formData); };
            return (
                <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden">
                        <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                            <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2"><div className="text-indigo-500"><IconPackage/></div> Inject Node</h2>
                            <button onClick={onClose} className="text-slate-500 hover:bg-slate-200 p-1 rounded-full"><IconX/></button>
                        </div>
                        <form onSubmit={handleSubmit} className="p-6 space-y-4">
                            <div>
                                <label className="block text-xs font-bold text-slate-600 uppercase mb-1">Product Designation</label>
                                <input autoFocus required type="text" className="w-full rounded-lg shadow-sm focus:border-indigo-500 focus:ring focus:ring-indigo-200 p-2.5 border" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-xs font-bold text-slate-600 uppercase mb-1">Store</label>
                                    <select className="w-full rounded-lg shadow-sm p-2.5 border" value={formData.storeId} onChange={e => setFormData({...formData, storeId: e.target.value})}>
                                        {STORES.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-600 uppercase mb-1">Agent</label>
                                    <select className="w-full rounded-lg shadow-sm p-2.5 border" value={formData.agentId} onChange={e => setFormData({...formData, agentId: e.target.value})}>
                                        {AGENTS.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-600 uppercase mb-1">Initial Brief</label>
                                <textarea className="w-full rounded-lg shadow-sm p-2.5 border min-h-[100px]" value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} />
                            </div>
                            <div className="pt-4 flex gap-3">
                                <button type="button" onClick={onClose} className="flex-1 py-2.5 text-sm font-semibold text-slate-600 bg-slate-100 rounded-lg">Cancel</button>
                                <button type="submit" className="flex-1 py-2.5 text-sm font-semibold text-white bg-indigo-600 rounded-lg">Initialize</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        function ProductDetailsModal({ product, onClose, onUpdate, onDelete, phases }) {
            const [formData, setFormData] = useState({ name: product.name, notes: product.notes || '', storeId: product.storeId, agentId: product.agentId, driveLink: product.driveLink || '', competitorUrl: product.competitorUrl || '' });
            return (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-end z-50">
                    <div className="bg-white w-full max-w-lg h-full shadow-2xl flex flex-col">
                        <div className="px-6 py-5 border-b border-slate-100 flex justify-between items-start bg-slate-50">
                            <div>
                                <div className="flex items-center gap-2 mb-1">
                                    <span className="bg-slate-200 text-slate-700 text-[10px] font-bold px-2 py-0.5 rounded-full uppercase">{phases.find(p => p.index === product.currentPhase)?.name}</span>
                                    <span className="text-slate-400 text-xs flex items-center gap-1"><IconClock/> Active Node</span>
                                </div>
                                <h2 className="text-xl font-extrabold text-slate-900 mt-1">{product.name}</h2>
                            </div>
                            <button onClick={onClose} className="text-slate-500 hover:bg-slate-200 p-2 rounded-full"><IconX/></button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-6 space-y-6">
                            <div className="grid grid-cols-2 gap-6">
                                <div><label className="block text-xs font-bold text-slate-500 uppercase mb-2">Designation</label><input type="text" className="w-full font-semibold border-b border-slate-200 pb-2 focus:outline-none" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} /></div>
                                <div><label className="block text-xs font-bold text-slate-500 uppercase mb-2">Assigned Agent</label><select className="w-full bg-slate-50 border border-slate-200 rounded-lg p-2" value={formData.agentId} onChange={e => setFormData({...formData, agentId: e.target.value})}>{AGENTS.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}</select></div>
                            </div>
                            <div><label className="block text-xs font-bold text-slate-500 uppercase mb-2">Target Store</label><select className="w-full bg-slate-50 border border-slate-200 rounded-lg p-2" value={formData.storeId} onChange={e => setFormData({...formData, storeId: e.target.value})}>{STORES.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}</select></div>
                            <div className="space-y-4 pt-4 border-t border-slate-100">
                                <div><label className="block text-[11px] font-bold text-slate-500 uppercase mb-1">Google Drive Link</label><input type="url" className="w-full border-slate-200 rounded-lg p-2 border" value={formData.driveLink} onChange={e => setFormData({...formData, driveLink: e.target.value})} /></div>
                                <div><label className="block text-[11px] font-bold text-slate-500 uppercase mb-1">Competitor URL</label><input type="url" className="w-full border-slate-200 rounded-lg p-2 border" value={formData.competitorUrl} onChange={e => setFormData({...formData, competitorUrl: e.target.value})} /></div>
                            </div>
                            <div className="pt-4 border-t border-slate-100"><label className="block text-xs font-bold text-slate-500 uppercase mb-2">Strategic Notes</label><textarea className="w-full border-slate-200 rounded-lg p-3 border min-h-[150px]" value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} /></div>
                        </div>
                        <div className="p-4 border-t border-slate-200 bg-slate-50 flex justify-between">
                            <button onClick={() => { if(window.confirm("Purge entity?")) onDelete(product.id); }} className="px-4 py-2 text-sm font-bold text-red-600 hover:bg-red-50 rounded-lg">Purge Entity</button>
                            <div className="flex gap-2">
                                <button onClick={onClose} className="px-5 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-200 rounded-lg">Cancel</button>
                                <button onClick={() => onUpdate(product.id, formData)} className="px-6 py-2 text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg">Commit</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('pipeline-root'));
        root.render(<PipelineApp />);
    </script>
</body>
</html>
